{% extends 'base.html' %}

{% block title %} Cart {% endblock %}

{% load static %}
{% block css %}
<link rel="stylesheet" href="{% static 'css/cart.css' %}">
{% endblock %}

{% block content %}
<div class="container mt-5 cart">

    <h1>Your Cart</h1>

    <h3>Total: ${{ order.total|default:"0.00" }}</h3>

    <div class="list">
        {% for item in items %}
        <div class="item">
            <label>{{item.product.title}}</label>
            <label>Price: ${{item.product.price}}</label>
            <label>Quantity: {{item.quantity}}</label>
        </div>
        {% empty %}
        <p>Your cart is empty.</p>
        {% endfor %}
    </div>

</div>
{% endblock %}
